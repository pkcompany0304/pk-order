// ===== нҷҳмңЁ мһҗлҸҷ м—…лҚ°мқҙнҠё (м—¬лҹ¬ мҶҢмҠӨ мӢңлҸ„) =====
async function fetchExchangeRate() {
  // 1м°Ё: exchangerate-api (л¬ҙлЈҢ, CORS м§Җмӣҗ)
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/CNY');
    const data = await res.json();
    if (data.rates && data.rates.KRW) {
      const rate = Math.round(data.rates.KRW);
      if (rate > 100 && rate < 400) {
        document.getElementById('rateInput').value = rate;
        onRateChange();
        return;
      }
    }
  } catch(e) {}
  // 2м°Ё: frankfurter
  try {
    const res = await fetch('https://api.frankfurter.dev/v1/latest?base=CNY&symbols=KRW');
    const data = await res.json();
    if (data.rates && data.rates.KRW) {
      const rate = Math.round(data.rates.KRW);
      if (rate > 100 && rate < 400) {
        document.getElementById('rateInput').value = rate;
        onRateChange();
        return;
      }
    }
  } catch(e) {}
  // нҸҙл°ұ
  document.getElementById('rateInput').value = 190;
}

function initClientSelect() {
  const sel = document.getElementById('headerClientSelect');
  CLIENTS.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;

// ===== мң нӢёлҰ¬нӢ° =====
function getRate() { return parseFloat(document.getElementById('rateInput').value) || 190; }
function getShip(cat) { return CAT_INFO[cat]?.ship || 2000; }
function fmtKrw(val) {
  val = Math.round(val);
  return val >= 10000 ? (val/10000).toFixed(1)+'л§Ң' : val.toLocaleString();
}
function saveDeleted() { localStorage.setItem('pk_deleted', JSON.stringify(deletedCodes)); }
function saveOrdered() { localStorage.setItem('pk_ordered', JSON.stringify(orderedCodes)); }

// ===== н•„н„°л§Ғ =====
function getSampleProducts() {
  return PRODUCTS.filter(p => !deletedCodes.includes(p.code) && !orderedCodes.includes(p.code));
}
function getOrderProducts() {
  return PRODUCTS.filter(p => orderedCodes.includes(p.code));
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('pageSample').classList.toggle('active', tab === 'sample');
  document.getElementById('pageOrder').classList.toggle('active', tab === 'order');
  document.getElementById('tabSample').classList.toggle('active', tab === 'sample');
  document.getElementById('tabOrder').classList.toggle('active', tab === 'order');
  document.getElementById('clientBar').style.display = tab === 'order' ? 'flex' : 'none';
  document.getElementById('orderBottomBar').classList.toggle('show', tab === 'order');
  if (tab === 'sample') renderSample();
  else renderOrder();
}

function updateBadges() {
  const sampleCount = getSampleProducts().length;
  const totalCount = PRODUCTS.length;
  document.getElementById('badgeCount').textContent = sampleCount + '/' + totalCount;

  const orderCount = getOrderProducts().length;

}

function renderSample() {
  const r = getRate();
  const el = document.getElementById('sampleGrid');
  const visible = getSampleProducts();
  updateBadges();

  if (visible.length === 0) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">рҹӣҚ</div><div class="empty-text">мғҒн’Ҳмқҙ м—ҶмҠөлӢҲлӢӨ</div><div class="empty-sub">лӘЁл“  мғҒн’Ҳмқҙ л°ңмЈј/мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ</div></div>';
    return;
  }

  let html = '';
  let lastDate = null;

  // мӢӨм ң м—…лЎңл“ңмқј(d н•„л“ң) кё°мӨҖ мөңмӢ мҲң м •л ¬
  // к°ҷмқҖ лӮ м§ң лӮҙм—җм„ңлҠ” нҒ¬лЎӨ мҲңм„ң(API нғҖмһ„мҠӨнғ¬н”„мҲң) мң м§Җ вҶ’ stable sort
  visible.sort((a, b) => {
    const toNum = d => d ? parseInt(d.replace('/', '')) : 0;
    return toNum(b.d) - toNum(a.d);
  });

  visible.forEach((p) => {
    const costKrw = Math.round(p.p * r);
    const ship = getShip(p.cat);
    const totalKrw = costKrw + ship;

    // м—…лЎңл“ң лӮ м§ң: d н•„л“ң(MM/DD) мҡ°м„ , м—Ҷмңјл©ҙ мқҙлҜём§Җ URLм—җм„ң м¶”м¶ң
    const uploadDate = p.d ? p.d.replace('/', '.') : (() => {
      const dm = p.i.match(/\/(20\d{2})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\//);
      return dm ? dm[2]+'.'+dm[3] : '??';
    })();
    if (uploadDate !== lastDate) {
      html += `<div class="date-divider">${uploadDate} м—…лЎңл“ң</div>`;
      lastDate = uploadDate;
    }

    html += `
    <div class="sample-card">
      <img class="sample-card-img" src="${p.i}?imageMogr2/auto-orient/thumbnail/!400x400r/quality/75/format/jpg" alt="${p.code}" loading="lazy">
      <div class="sample-card-body">
        <div class="sample-card-name">${p.t}</div>
        <div class="sample-card-price">вӮ©${fmtKrw(totalKrw)}</div>
        <div class="sample-btn-row">
          <button class="btn-sample" onclick="sampleOrder('${p.code}')">мӮ¬мһ… ліөмӮ¬</button>
          <button class="btn-delete" onclick="deleteItem('${p.code}')">вң•</button>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

    updateTotal();
    return;
  }

  let html = '';
  items.forEach((p) => {
    const pidx = PRODUCTS.indexOf(p);
    const sizes = p.s ? p.s.split('/').filter(Boolean) : [];
    const displaySizes = sizes.length > 0 ? sizes : ['S','M','L','XL'];
    const costKrw = Math.round(p.p * r);
    const ship = getShip(p.cat);
    const totalPerPcs = costKrw + ship;

    const catOptions = CAT_KEYS.map(k =>
      `<option value="${k}"${k===p.cat?' selected':''}>${CAT_INFO[k].label} вӮ©${CAT_INFO[k].ship.toLocaleString()}</option>`
    ).join('');

    // мғүмғҒ мһҗлҸҷ к°җм§Җ
    const colorKws = ['лё”лһҷ','нҷ”мқҙнҠё','н•‘нҒ¬','лё”лЈЁ','к·ёлҰ°','л Ҳл“ң','к·ёл Ҳмқҙ','лёҢлқјмҡҙ','лІ мқҙм§Җ','м№ҙнӮӨ','мҳҗлЎңмҡ°','нҚјн”Ң','мҳӨл Ңм§Җ','л„Өмқҙл№„','нҒ¬лҰј','м•„мқҙліҙлҰ¬','лҜјнҠё'];
    let detectedColors = [];
    colorKws.forEach(c => { if (p.t.includes(c) && !detectedColors.includes(c)) detectedColors.push(c); });
    if (detectedColors.length === 0) detectedColors = [''];

    // мӮ¬мқҙмҰҲ н—ӨлҚ”
    const sizeHeaders = displaySizes.map(sz => `<th>${sz}</th>`).join('');

    // мғүмғҒ н–ү
    const colorRows = detectedColors.map(color => makeColorRow(p.code, displaySizes, color)).join('');

    html += `
    <div class="order-card" data-code="${p.code}">
      <div class="order-card-top">
        <img class="order-card-img-sm" src="${p.i}?imageMogr2/auto-orient/thumbnail/!200x200r/quality/75/format/jpg" loading="lazy">
        <div class="order-card-info">
          <div class="order-card-code">#${p.code}</div>
          <div class="order-card-name">${p.t.replace(/^\d+#рҹ’°[\d.]+ВҘ\s*/,'').replace(/^\d+#[^ВҘ]*ВҘ\s*/,'') || p.t}</div>
          <div class="order-card-price-row">
            <span class="order-card-cny">ВҘ${p.p}</span>
            <span class="order-card-krw">вӮ©${fmtKrw(totalPerPcs)}</span>
            <span style="font-size:10px;color:#aeaeb2">(мҡҙмһ„нҸ¬н•Ё)</span>
          </div>
          <div class="order-card-meta">
            <select class="cat-select" style="font-size:11px;padding:3px 6px;border:1px solid #e5e5ea;border-radius:6px;background:#fff" onchange="onCatChange(${pidx},this.value)">${catOptions}</select>
            <span class="order-subtotal-tag" id="subtotal_${p.code}">0мһҘ</span>
          </div>
        </div>
        <button class="order-card-remove" onclick="removeFromOrder('${p.code}')">вң•</button>
      </div>
      <div class="order-table-wrap">
        <table class="order-table">
          <thead><tr><th>мғүмғҒ</th>${sizeHeaders}<th>мҶҢкі„</th><th></th></tr></thead>
          <tbody id="tbody_${p.code}">${colorRows}</tbody>
        </table>
        <button class="btn-add-color" onclick="addColorRow('${p.code}')">+ мғүмғҒ м¶”к°Җ</button>
      </div>
    </div>`;
  });

  el.innerHTML = html;
  updateTotal();
}

function makeColorRow(code, sizes, colorName) {
  const sizeInputs = sizes.map(sz =>
    `<td><input type="number" class="qty-input" inputmode="numeric" min="0" placeholder="0"
      data-code="${code}" data-size="${sz}" oninput="onQtyInput(this)"></td>`
  ).join('');
  return `<tr class="color-row">
    <td><input type="text" class="color-name-input" placeholder="мғүмғҒ" value="${colorName}"></td>
    ${sizeInputs}
    <td class="row-sub">0</td>
    <td><button class="btn-del-row" onclick="removeColorRow(this)">вҲ’</button></td>
  </tr>`;
}

function addColorRow(code) {
  const tbody = document.getElementById('tbody_' + code);
  if (!tbody) return;
  const firstRow = tbody.querySelector('tr');
  const sizes = firstRow ? firstRow.querySelectorAll('.qty-input').length : 4;
  const sizeNames = firstRow
    ? Array.from(firstRow.querySelectorAll('.qty-input')).map(i => i.dataset.size)
    : ['S','M','L','XL'];
  const newRow = document.createElement('tr');
  newRow.className = 'color-row';
  let html = `<td><input type="text" class="color-name-input" placeholder="мғүмғҒ" value=""></td>`;
  sizeNames.forEach(sz => {
    html += `<td><input type="number" class="qty-input" inputmode="numeric" min="0" placeholder="0" data-code="${code}" data-size="${sz}" oninput="onQtyInput(this)"></td>`;
  });
  html += `<td class="row-sub">0</td><td><button class="btn-del-row" onclick="removeColorRow(this)">вҲ’</button></td>`;
  newRow.innerHTML = html;
  tbody.appendChild(newRow);
}

function removeColorRow(btn) {
  const row = btn.closest('tr');
  const tbody = row.closest('tbody');
  if (tbody.querySelectorAll('tr').length <= 1) return; // мөңмҶҢ 1н–ү мң м§Җ
  const code = tbody.id.replace('tbody_','');
  row.remove();
  updateSubtotal(code);
  updateTotal();
}

function onQtyInput(inp) {
  const row = inp.closest('tr');
  const rowTotal = Array.from(row.querySelectorAll('.qty-input')).reduce((s,i) => s+(parseInt(i.value)||0), 0);
  const rowSub = row.querySelector('.row-sub');
  if (rowSub) rowSub.textContent = rowTotal + 'мһҘ';
  updateSubtotal(inp.dataset.code);
  updateTotal();
}

function updateSubtotal(code) {
  const tbody = document.getElementById('tbody_' + code);
  if (!tbody) return;
  const total = Array.from(tbody.querySelectorAll('.qty-input')).reduce((s,i) => s+(parseInt(i.value)||0), 0);
  const tag = document.getElementById('subtotal_' + code);
  if (tag) tag.textContent = total + 'мһҘ';
}


// ===== мӮ¬мһ… ліөмӮ¬ (мғҳн”Ң вҶ’ л°ңмЈј мқҙлҸҷ) =====
function sampleOrder(code) {
  const p = PRODUCTS.find(pr => pr.code === code);
  if (!p) return;
  const sizes = p.s.split('/').filter(Boolean);
  let light = sizes.length >= 2 ? sizes[Math.floor(sizes.length/2)-1] : sizes[0];
  let dark = sizes.length >= 2 ? sizes[Math.floor(sizes.length/2)] : sizes[0];
  const msg = `жӢҝж ·: ${p.code} ${p.t}\nжө…иүІ ${light}-1  ж·ұиүІ ${dark}-1\nе…ұ2д»¶  ВҘ${p.p}/д»¶`;
  copyText(msg);

  // л°ңмЈј лӘ©лЎқм—җ м¶”к°Җ
  if (!orderedCodes.includes(code)) {
    orderedCodes.push(code);
    saveOrdered();
  }

  renderSample();
  updateBadges();
  showToast('мӮ¬мһ… ліөмӮ¬ мҷ„лЈҢ\nл°ңмЈј нҺҳмқҙм§ҖлЎң мқҙлҸҷлҗЁ');
}

// ===== л°ңмЈјм—җм„ң м ңкұ° (мғҳн”ҢлЎң ліөк·Җ) =====
function removeFromOrder(code) {
  orderedCodes = orderedCodes.filter(c => c !== code);
  saveOrdered();
  renderOrder();
  updateBadges();
  showToast('мғҳн”ҢлЎң ліөк·Җ');
}

// ===== мӮӯм ң =====
function deleteItem(code) {
  lastDeleted = code;
  deletedCodes.push(code);
  saveDeleted();
  renderSample();
  updateBadges();
  const btn = document.getElementById('btnUndo');
  btn.classList.add('show');
  btn.textContent = 'лҗҳлҸҢлҰ¬кё° (' + code + ')';
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { btn.classList.remove('show'); undoTimer = null; }, 5000);
  showToast('мӮӯм ңлҗЁ');
}

function undoDelete() {
  if (!lastDeleted) return;
  deletedCodes = deletedCodes.filter(c => c !== lastDeleted);
  saveDeleted();
  lastDeleted = null;
  document.getElementById('btnUndo').classList.remove('show');
  if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
  renderSample();
  updateBadges();
  showToast('ліөкө¬лҗЁ');
}

// ===== м№ҙн…Ңкі лҰ¬ ліҖкІҪ =====
function onCatChange(idx, val) {
  PRODUCTS[idx].cat = val;
  renderOrder();
}

// ===== нҷҳмңЁ ліҖкІҪ =====
function onRateChange() {
  if (currentTab === 'sample') renderSample();
  else renderOrder();
}

// ===== мҲҳлҹү н•©кі„ =====
function updateTotal() {
  let totalQty = 0;
  let totalKrw = 0;
  const r = getRate();
  document.querySelectorAll('.order-card').forEach(card => {
    const code = card.dataset.code;
    const p = PRODUCTS.find(pr => pr.code === code);
    if (!p) return;
    const ship = getShip(p.cat);
    const unitKrw = Math.round(p.p * r) + ship;
    card.querySelectorAll('.qty-input').forEach(inp => {
      const qty = parseInt(inp.value) || 0;
      totalQty += qty;
      totalKrw += qty * unitKrw;
    });
  });
  document.getElementById('totalQty').textContent = totalQty;
  const amtEl = document.getElementById('totalAmount');
  if (amtEl) amtEl.textContent = 'вӮ©' + fmtKrw(totalKrw);
}

// ===== л°ңмЈј л©”мӢңм§Җ мғқм„ұ =====
function generateOrder() {
  const clientName = document.getElementById('headerClientSelect').value || '';
  const r = getRate();
  const orders = {};

  document.querySelectorAll('.order-card').forEach(card => {
    const code = card.dataset.code;
    const p = PRODUCTS.find(pr => pr.code === code);
    if (!p) return;
    const tbody = document.getElementById('tbody_' + code);
    if (!tbody) return;

    tbody.querySelectorAll('.color-row').forEach(row => {
      const colorName = (row.querySelector('.color-name-input')?.value || '').trim() || 'кё°ліё';
      row.querySelectorAll('.qty-input').forEach(inp => {
        const qty = parseInt(inp.value) || 0;
        if (qty > 0) {
          const sz = inp.dataset.size;
          if (!orders[code]) orders[code] = {title:p.t, price:p.p, items:[], p};
          orders[code].items.push({sz, color:colorName, qty});
        }
      });
    });
  });

  if (!Object.keys(orders).length) { showToast('мҲҳлҹүмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”'); return; }

  const rateVal = getRate();
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  let msg = `гҖҗл°ңмЈјм„ңгҖ‘${dateStr}\n`;
  if (clientName) msg += `${clientName}\n`;
  msg += `в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n`;
  let grandQty = 0;
  let grandKrw = 0;
  for (const [code, data] of Object.entries(orders)) {
    let sub = 0;
    const parts = [];
    data.items.forEach(({sz, color, qty}) => {
      sub += qty;
      const label = color !== 'кё°ліё' ? `${color} ${sz}` : sz;
      parts.push(`${label}-${qty}`);
    });
    grandQty += sub;
    const ship = getShip(data.p.cat);
    const unitKrw = Math.round(data.p.p * rateVal) + ship;
    const subtotalKrw = unitKrw * sub;
    grandKrw += subtotalKrw;
    msg += `${code} (${sub}мһҘ) вӮ©${fmtKrw(subtotalKrw)}\n`;
    msg += `  ${parts.join(' / ')}\n`;
  }
  msg += `в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n`;
  msg += `мҙқ ${grandQty}мһҘ  н•©кі„ вӮ©${fmtKrw(grandKrw)}`;
  copyText(msg);
  showToast(`л°ңмЈј ліөмӮ¬ мҷ„лЈҢ!\n${grandQty}мһҘ / вӮ©${fmtKrw(grandKrw)}`);
}

// ===== нҒҙлҰҪліҙл“ң =====
function copyText(text) {
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
}

// ===== Toast =====
function showToast(msg) {
  const t=document.getElementById('toast');t.innerHTML=msg.replace(/\n/g,'<br>');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}

// ===== мҙҲкё°нҷ” =====
initClientSelect();
fetchExchangeRate();
renderSample();
updateBadges();
</script>
