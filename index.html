<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<title>PK 사입/발주</title>
<style>
:root{--bg:#F5F5F7;--surface:#FFFFFF;--text-primary:#1D1D1F;--text-secondary:#6E6E73;--text-tertiary:#AEAEB2;--accent:#FF2D55;--accent-light:#FFF0F3;--border:#E5E5EA;--border-light:#F2F2F7}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'SF Pro Display','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text-primary);padding-bottom:90px;-webkit-font-smoothing:antialiased}

/* ===== 헤더 ===== */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.exchange-chip{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--text-secondary);white-space:nowrap}
.exchange-chip .rate-input{width:42px;padding:3px 0;border:1px solid var(--border);background:var(--border-light);font-size:12px;font-weight:700;text-align:center;border-radius:5px;-webkit-appearance:none;outline:none}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-top h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.badge-count{background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.rate-bar{display:none}
.rate-bar label{color:#636366;font-weight:500;white-space:nowrap}
.rate-input{width:64px;padding:6px 8px;border:1.5px solid #e5e5ea;border-radius:8px;font-size:14px;font-weight:600;text-align:center;-webkit-appearance:none;background:#fff}
.rate-input:focus{border-color:#007aff;outline:none}
.rate-bar span{color:#aeaeb2;font-size:12px}
/* 거래처 바 — 발주 페이지에서만 보임 */
.client-bar{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px}
.client-bar label{color:#636366;font-weight:500;white-space:nowrap}
.header-client-select{flex:1;padding:6px 10px;border:1.5px solid #e5e5ea;border-radius:8px;font-size:13px;font-weight:600;-webkit-appearance:none;background:#fff;color:#1c1c1e}
.header-client-select:focus{border-color:#007aff;outline:none}

/* ===== 페이지 컨테이너 ===== */
.page{display:none}
.page.active{display:block}

/* ===== 샘플 그리드 ===== */
.sample-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}

/* ===== 샘플 카드 ===== */
.sample-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sample-card-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center 20%;display:block}
.sample-card-body{padding:12px}
.sample-card-name{font-size:13px;font-weight:600;color:#1c1c1e;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:keep-all}
.sample-card-price{font-size:15px;font-weight:700;color:#ff3b30;letter-spacing:-0.3px;margin-bottom:10px}
.sample-btn-row{display:flex;gap:6px}
.btn-sample{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#34c759;color:#fff;transition:transform .1s}
.btn-sample:active{opacity:.7;transform:scale(.97)}
.btn-delete{flex:0 0 42px;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#ff3b30;color:#fff;line-height:1;transition:transform .1s}
.btn-delete:active{opacity:.7;transform:scale(.97)}

/* ===== 발주 그리드 (새 디자인) ===== */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;padding-bottom:140px}
.order-card{background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border-light)}

.product-thumb{position:relative;width:100%;aspect-ratio:1/1.35;overflow:hidden;background:#1a1a1a}
.product-thumb img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block}
.img-strip{display:flex;width:100%;height:100%;transition:transform 0.22s ease;will-change:transform}
.img-strip img{flex-shrink:0;min-width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block}
.img-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;pointer-events:none;z-index:1}
.img-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.45);transition:background 0.15s}
.img-dot.active{background:rgba(255,255,255,0.95)}

.product-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.qty-badge{position:absolute;top:8px;right:8px;background:var(--accent);color:white;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.product-info{padding:8px 10px 0;display:flex;flex-direction:column}
.product-category{font-size:11px;color:var(--text-tertiary);font-weight:500;display:flex;justify-content:space-between;align-items:center}
.card-remove-btn{background:none;border:none;color:var(--text-tertiary);font-size:13px;cursor:pointer;padding:0;line-height:1}
.product-title{font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.product-price{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-0.03em;margin-top:3px;margin-bottom:0}

.size-input-area{padding:5px 10px 10px}
.size-grid{display:grid;gap:3px 5px;align-items:center}
.size-header{font-size:11px;font-weight:700;color:var(--text-secondary);text-align:center;line-height:1}
.size-row{display:contents}
.color-label{font-size:13px;color:var(--text-primary);display:flex;align-items:center;font-weight:600;min-height:36px;padding-right:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.size-input{width:100%;height:36px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:15px;font-weight:700;font-family:inherit;color:var(--text-primary);background:var(--bg);transition:all 0.12s;outline:none;-webkit-appearance:none}
.size-input:focus{border-color:var(--accent);background:var(--accent-light)}
.size-input:not(:placeholder-shown){background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.btn-add-color-new{margin-top:5px;width:100%;padding:6px;border:1.5px dashed var(--border);border-radius:8px;background:transparent;color:var(--text-secondary);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer}

/* ===== 하단 탭바 ===== */
.tab-bar-wrap{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:200}
.tab-bar{display:flex;border-top:1px solid var(--border-light);padding:4px 0 env(safe-area-inset-bottom,4px)}
.tab{flex:1;padding:10px 0 5px;border:none;background:none;font-size:11px;font-weight:600;color:var(--text-tertiary);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.tab.active{color:var(--accent)}
.tab.active svg{color:var(--accent)}
.tab svg{width:22px;height:22px;color:var(--text-tertiary)}
.tab-badge{position:absolute;top:3px;right:calc(50% - 16px);background:var(--accent);color:#fff;font-size:8px;font-weight:700;width:14px;height:14px;border-radius:50%;display:none;align-items:center;justify-content:center}
.tab-badge.show{display:flex}

/* ===== 하단 발주바 (발주 페이지) ===== */
.order-bottom-bar{position:fixed;bottom:52px;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:none;z-index:150}
.order-bottom-bar.show{display:block}
.order-summary{display:flex;align-items:center;justify-content:space-between;padding:8px 14px}
.summary-left{display:flex;align-items:baseline;gap:10px}
.summary-total{font-size:12px;color:var(--text-secondary)}
.summary-total strong{font-size:18px;font-weight:800;color:var(--text-primary);letter-spacing:-0.03em}
.summary-amount{font-size:14px;font-weight:700;color:var(--accent)}
.btn-copy{background:var(--text-primary);color:white;border:none;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-copy:active{transform:scale(0.96);opacity:0.85}
.btn-wechat{background:#07c160;color:white;border:none;padding:13px 16px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-left:6px}
.btn-wechat:active{transform:scale(0.96);opacity:0.85}

/* ===== 날짜 구분바 ===== */
.date-divider{grid-column:1/-1;padding:8px 14px;background:#e5e5ea;font-size:11px;font-weight:700;color:#636366;text-align:center;border-radius:8px}

/* ===== Undo ===== */
.btn-undo{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 24px;border:none;border-radius:22px;font-size:13px;font-weight:600;background:rgba(50,50,50,.85);color:#fff;cursor:pointer;z-index:180;display:none;backdrop-filter:blur(10px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-undo.show{display:block}

/* ===== Toast ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.78);color:#fff;padding:14px 28px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:300;text-align:center;backdrop-filter:blur(10px)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ===== 빈 상태 ===== */
.empty-state{text-align:center;padding:80px 20px;color:#aeaeb2}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state .empty-text{font-size:15px;font-weight:600;color:#8e8e93}
.empty-state .empty-sub{font-size:13px;margin-top:6px;color:#aeaeb2}

.sample-thumb{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:#1a1a1a;cursor:pointer}
.sample-thumb .img-strip{display:flex;width:100%;height:100%;transition:transform .22s ease;will-change:transform}
.sample-thumb .img-strip img{flex-shrink:0;min-width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block}
.sample-photo-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:11px;pointer-events:none;z-index:2}
.sg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column}
.sg-overlay.show{display:flex}
.sg-img{max-width:100%;max-height:80vh;object-fit:contain}
.sg-counter{color:#fff;font-size:14px;margin-top:14px;letter-spacing:.5px}
.sg-close{position:absolute;top:16px;right:20px;color:#fff;font-size:34px;font-weight:300;cursor:pointer;line-height:1}
.sg-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:44px;font-weight:300;cursor:pointer;padding:0 18px;user-select:none}
.sg-prev{left:0}.sg-next{right:0}
.sg-dots{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:80%}
.sg-dot{width:7px;height:7px;border-radius:50%;background:#666}.sg-dot.active{background:#fff}
.thumb2up{display:flex;width:100%;height:100%;gap:1px;background:#000}
.thumb2up img{width:50%;height:100%;object-fit:cover;object-position:center 18%;display:block}
.thumb2up.one img{width:100%}
.color-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.cchip{font-size:10px;font-weight:600;color:#3a3a3c;background:#eef0f2;border-radius:8px;padding:2px 7px;line-height:1.5}
.sample-card-name.expanded{-webkit-line-clamp:unset;display:block}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-top">
    <h1 id="headerTitle">AOPI.有米家</h1>
    <div style="display:flex;align-items:center;gap:8px">

<div class="page active" id="pageSample">

</div>

<!-- 발주 페이지 -->
<div class="page" id="pageOrder">

</div>

</div>

      샘플
    </button>
    <button class="tab" id="tabOrder" onclick="switchTab('order')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8M8 12h8M8 17h4"/></svg>
      발주
      <span class="tab-badge" id="orderBadge">0</span>
    </button>
  </div>
</div>

<button class="btn-undo" id="btnUndo" onclick="undoDelete()">되돌리기</button>
<div class="toast" id="toast"></div>

// ===== 환율 자동 업데이트 (여러 소스 시도) =====
async function fetchExchangeRate() {
  // 1차: exchangerate-api (무료, CORS 지원)
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/CNY');
    const data = await res.json();
    if (data.rates && data.rates.KRW) {
      const rate = Math.round(data.rates.KRW);
      if (rate > 100 && rate < 400) {
        document.getElementById('rateInput').value = rate;
        onRateChange();
        return;
      }
    }
  } catch(e) {}
  // 2차: frankfurter
  try {
    const res = await fetch('https://api.frankfurter.dev/v1/latest?base=CNY&symbols=KRW');
    const data = await res.json();
    if (data.rates && data.rates.KRW) {
      const rate = Math.round(data.rates.KRW);
      if (rate > 100 && rate < 400) {
        document.getElementById('rateInput').value = rate;
        onRateChange();
        return;
      }
    }
  } catch(e) {}
  // 폴백
  document.getElementById('rateInput').value = 190;
}

// ===== 샘플 페이지 렌더 =====
function renderSample() {
  const r = getRate();
  const el = document.getElementById('sampleGrid');
  const visible = getSampleProducts();
  updateBadges();

  if (visible.length === 0) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🛍</div><div class="empty-text">상품이 없습니다</div><div class="empty-sub">모든 상품이 발주/삭제되었습니다</div></div>';
    return;
  }

  let html = '';
  let lastDate = null;

  // 실제 업로드일(d 필드) 기준 최신순 정렬
  // 같은 날짜 내에서는 크롤 순서(API 타임스탬프순) 유지 → stable sort
  visible.sort((a, b) => {
    const toNum = d => d ? parseInt(d.replace('/', '')) : 0;
    return toNum(b.d) - toNum(a.d);
  });

  visible.forEach((p) => {
    const costKrw = Math.round(p.p * r);
    const ship = getShip(p.cat);
    const totalKrw = costKrw + ship;

    // 업로드 날짜: d 필드(MM/DD) 우선, 없으면 이미지 URL에서 추출
    const uploadDate = p.d ? p.d.replace('/', '.') : (() => {
      const dm = p.i.match(/\/(20\d{2})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\//);
      return dm ? dm[2]+'.'+dm[3] : '??';
    })();
    if (uploadDate !== lastDate) {
      html += `<div class="date-divider">${uploadDate} 업로드</div>`;
      lastDate = uploadDate;
    }

    html += `
    <div class="sample-card">
      <div class="sample-thumb" onclick="openSampleGallery('${p.code}')">${sample2up(p)}${samplePhotoBadge(p)}</div>
      <div class="sample-card-body">
        ${colorChips(p)}
        <div class="sample-card-name" onclick="this.classList.toggle('expanded')">${dispName(p)}</div>
        <div class="sample-card-price">₩${fmtKrw(totalKrw)}</div>
        <div class="sample-btn-row">
          <button class="btn-sample" onclick="sampleOrder('${p.code}')">사입 복사</button>
          <button class="btn-delete" onclick="deleteItem('${p.code}')">✕</button>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

// ===== 색상/사이즈 자동 파싱 =====
function parseSizesAndColors(s, title) {
  const CN_COLOR = {
    '黑色':'블랙','白色':'화이트','粉色':'핑크','蓝色':'블루','绿色':'그린',
    '红色':'레드','灰色':'그레이','棕色':'브라운','咖色':'브라운','杏色':'살구',
    '卡其':'카키','黄色':'옐로우','紫色':'퍼플','橙色':'오렌지','米色':'베이지',
    '奶白':'크림','米白':'아이보리','薄荷':'민트','深蓝':'네이비','藏蓝':'네이비',
    '浅蓝':'스카이블루','浅粉':'연핑크','深绿':'딥그린','酒红':'와인레드'
  };
  const KO_COLORS = ['블랙','화이트','핑크','블루','그린','레드','그레이','브라운',
    '베이지','카키','옐로우','퍼플','오렌지','네이비','크림','아이보리','민트'];

  const formats = s ? s.split('/').filter(Boolean) : [];

  if (formats.length === 0) {
    // 타이틀에서 한국어 컬러 감지
    const koColors = KO_COLORS.filter(c => title.includes(c));
    return { colors: koColors, sizes: [] };
  }

  // formats에서 중국어 컬러 감지
  let foundCN = [];
  for (const [cn] of Object.entries(CN_COLOR)) {
    if (formats.some(f => f.includes(cn))) foundCN.push(cn);
  }

  if (foundCN.length > 0) {
    const colorSet = new Set();
    const sizeSet = new Set();
    formats.forEach(f => {
      let rem = f;
      for (const cn of foundCN) {
        if (f.includes(cn)) {
          colorSet.add(CN_COLOR[cn]);
          rem = f.replace(cn, '').trim();
          break;
        }
      }
      if (rem) sizeSet.add(rem);
    });
    const colors = [...colorSet];
    const sizes = [...sizeSet].filter(x => x.length > 0);
    return { colors, sizes };
  }

  // 순수 사이즈만 있는 경우 (S/M/L 등)
  // 균码 처리
  const cleaned = formats.map(f => {
    if (f === '均码' || f === '均') return 'F';
    return f;
  });
  return { colors: [], sizes: cleaned };
}

  if (items.length === 0) {
    el.className = '';
    el.style.padding = '12px';
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">발주 상품이 없습니다</div><div class="empty-sub">샘플 탭에서 "사입 복사"를 누르면 여기에 추가됩니다</div></div>';
    updateTotal();
    return;
  }

  el.className = 'product-grid';
  el.style.padding = '';

  let html = '';
  items.forEach((p) => {
    const pidx = PRODUCTS.indexOf(p);
    const { colors: parsedColors, sizes: parsedSizes } = parseSizesAndColors(p.s, p.t);
    const displaySizes = parsedSizes.length > 0 ? parsedSizes : ['S','M','L'];
    const costKrw = Math.round(p.p * r);
    const ship = getShip(p.cat);
    const totalPerPcs = costKrw + ship;
    const catLabel = CAT_INFO[p.cat]?.label || '기타';
    const colCount = displaySizes.length;

    // 색상: formats 파싱 우선, 없으면 기본 1행
    const detectedColors = (p.colors && p.colors.length) ? p.colors : (parsedColors.length > 0 ? parsedColors : ['']);

    // 사이즈 헤더 행
    let sizeGridHtml = '<div class="size-header"></div>';
    displaySizes.forEach(sz => { sizeGridHtml += `<div class="size-header">${sz}</div>`; });
    // 최소 3열 유지(헤더 패딩)
    for (let i = colCount; i < 3; i++) sizeGridHtml += '<div class="size-header"></div>';

    // 색상 행
    detectedColors.forEach(color => {
      sizeGridHtml += makeColorRowGrid(p.code, displaySizes, color);
    });

    const cleanTitle = p.t.replace(/^\d+#💰[\d.]+¥\s*/,'').replace(/^\d+#[^¥]*¥\s*/,'') || p.t;

    // 이미지 갤러리: imgs[] 배열 우선, 없으면 단일 이미지
    const imgArr = (p.imgs && p.imgs.length > 0) ? p.imgs : [p.i];
    const imgStripHtml = imgArr.map((url, ii) =>
      `<img src="${url}?imageMogr2/auto-orient/thumbnail/!400x400r/quality/75/format/jpg" loading="${ii===0?'eager':'lazy'}" onerror="this.style.display='none'">`
    ).join('');
    const dotsHtml = imgArr.length > 1
      ? `<div class="img-dots">${imgArr.map((_,ii) => `<div class="img-dot${ii===0?' active':''}"></div>`).join('')}</div>`
      : '';

    html += `
    <div class="order-card" data-code="${p.code}" data-sizes="${displaySizes.join('/')}">
      <div class="product-thumb" ontouchstart="imgSwipeStart(event,this)" ontouchend="imgSwipeEnd(event,this)">
        <div class="img-strip">${imgStripHtml}</div>
        ${dotsHtml}
        <span class="product-badge">#${p.code}</span>
        <div class="qty-badge" id="qtyBadge_${p.code}" style="display:none">0</div>
      </div>
      <div class="product-info">
        <div class="product-category">
          <span>${catLabel} · ¥${p.p}</span>
          <button class="card-remove-btn" onclick="removeFromOrder('${p.code}')">✕</button>
        </div>
        <div class="product-title">${cleanTitle}</div>
        <div class="product-price">₩${fmtKrw(totalPerPcs)}</div>
      </div>
      <div class="size-input-area">
        <div class="size-grid" id="sizeGrid_${p.code}"
             style="grid-template-columns:auto repeat(${Math.max(colCount,3)},1fr)">
          ${sizeGridHtml}
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
  updateTotal();
}

function makeColorRowGrid(code, sizes, colorName) {
  const label = colorName || '기본';
  let html = `<div class="size-row"><span class="color-label" title="${label}">${label}</span>`;
  sizes.forEach(sz => {
    html += `<input class="size-input qty-input" type="number" inputmode="numeric"
      placeholder="0" min="0"
      data-code="${code}" data-size="${sz}" data-color="${label}"
      oninput="onQtyInput(this)">`;
  });
  // 빈 셀로 3열 맞추기
  for (let i = sizes.length; i < 3; i++) {
    html += `<input class="size-input" style="visibility:hidden" disabled>`;
  }
  html += '</div>';
  return html;
}

// ===== 이미지 갤러리 스와이프 =====
let _imgSwX = 0, _imgSwY = 0;
function imgSwipeStart(e, thumb) {
  const t = e.touches[0];
  _imgSwX = t.clientX; _imgSwY = t.clientY;
}
function imgSwipeEnd(e, thumb) {
  const t = e.changedTouches[0];
  const dx = t.clientX - _imgSwX;
  const dy = t.clientY - _imgSwY;
  if (Math.abs(dy) > Math.abs(dx) + 10) return; // vertical scroll → ignore
  if (Math.abs(dx) < 18) { // tap
    const rect = thumb.getBoundingClientRect();
    const tapX = (t.clientX - rect.left) / rect.width;
    if (tapX < 0.35) imgNav(thumb, -1);
    else if (tapX > 0.65) imgNav(thumb, 1);
    return;
  }
  imgNav(thumb, dx < 0 ? 1 : -1);
}
function imgNav(thumb, dir) {
  const strip = thumb.querySelector('.img-strip');
  if (!strip) return;
  const total = strip.querySelectorAll('img').length;
  if (total <= 1) return;
  let idx = (parseInt(strip.dataset.idx || '0') + dir + total) % total;
  strip.dataset.idx = idx;
  strip.style.transform = 'translateX(-' + (idx * 100) + '%)';
  thumb.querySelectorAll('.img-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function addColorRowGrid(code) {
  const card = document.querySelector(`.order-card[data-code="${code}"]`);
  if (!card) return;
  const grid = document.getElementById('sizeGrid_' + code);
  if (!grid) return;
  const sizesStr = card.dataset.sizes || 'S/M/L';
  const sizes = sizesStr.split('/').filter(Boolean);
  const colorNum = grid.querySelectorAll('.size-row').length + 1;
  const colorName = '색상' + colorNum;
  grid.insertAdjacentHTML('beforeend', makeColorRowGrid(code, sizes, colorName));
}

function onQtyInput(inp) {
  updateSubtotal(inp.dataset.code);
  updateTotal();
}

function updateSubtotal(code) {
  const card = document.querySelector(`.order-card[data-code="${code}"]`);
  if (!card) return;
  const total = Array.from(card.querySelectorAll('.qty-input')).reduce((s,i) => s+(parseInt(i.value)||0), 0);
  const badge = document.getElementById('qtyBadge_' + code);
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
  }
}


// ===== 사입 복사 (샘플 → 발주 이동) =====
function sampleOrder(code) {
  const p = PRODUCTS.find(pr => pr.code === code);
  if (!p) return;
  const sizes = p.s.split('/').filter(Boolean);
  let light = sizes.length >= 2 ? sizes[Math.floor(sizes.length/2)-1] : sizes[0];
  let dark = sizes.length >= 2 ? sizes[Math.floor(sizes.length/2)] : sizes[0];
  const msg = `拿样: ${p.code} ${p.t}\n浅色 ${light}-1  深色 ${dark}-1\n共2件  ¥${p.p}/件`;
  copyText(msg);

  // 발주 목록에 추가
  if (!orderedCodes.includes(code)) {
    orderedCodes.push(code);
    saveOrdered();
  }

  renderSample();
  updateBadges();
  showToast('사입 복사 완료\n발주 페이지로 이동됨');
}

// ===== 발주에서 제거 (샘플로 복귀) =====
function removeFromOrder(code) {
  orderedCodes = orderedCodes.filter(c => c !== code);
  saveOrdered();
  renderOrder();
  updateBadges();
  showToast('샘플로 복귀');
}

// ===== 삭제 =====
function deleteItem(code) {
  lastDeleted = code;
  deletedCodes.push(code);
  saveDeleted();
  renderSample();
  updateBadges();
  const btn = document.getElementById('btnUndo');
  btn.classList.add('show');
  btn.textContent = '되돌리기 (' + code + ')';
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { btn.classList.remove('show'); undoTimer = null; }, 5000);
  showToast('삭제됨');
}

function undoDelete() {
  if (!lastDeleted) return;
  deletedCodes = deletedCodes.filter(c => c !== lastDeleted);
  saveDeleted();
  lastDeleted = null;
  document.getElementById('btnUndo').classList.remove('show');
  if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
  renderSample();
  updateBadges();
  showToast('복구됨');
}

// ===== 카테고리 변경 =====
function onCatChange(idx, val) {
  PRODUCTS[idx].cat = val;
  renderOrder();
}

// ===== 환율 변경 =====
function onRateChange() {
  if (currentTab === 'sample') renderSample();
  else renderOrder();
}

// ===== 수량 합계 =====
function updateTotal() {
  let totalQty = 0;
  let totalKrw = 0;
  const r = getRate();
  document.querySelectorAll('.order-card').forEach(card => {
    const code = card.dataset.code;
    const p = PRODUCTS.find(pr => pr.code === code);
    if (!p) return;
    const ship = getShip(p.cat);
    const unitKrw = Math.round(p.p * r) + ship;
    card.querySelectorAll('.qty-input').forEach(inp => {
      const qty = parseInt(inp.value) || 0;
      totalQty += qty;
      totalKrw += qty * unitKrw;
    });
  });
  document.getElementById('totalQty').textContent = totalQty;
  const amtEl = document.getElementById('totalAmount');
  if (amtEl) amtEl.textContent = '₩' + fmtKrw(totalKrw);
}


// ===== AOPI 단체방 바로가기 =====
function openAOPIGroup() {
  if (AOPI_GROUP_LINK) {
    // weixin.qq.com/g/{ticket} → 내부 딥링크로 그룹 채팅 직접 진입
    const ticket = AOPI_GROUP_LINK.split('/g/')[1] || '';
    if (ticket) {
      window.location.href = `weixin://dl/groupmessage?ticket=${ticket}`;
    } else {
      window.open(AOPI_GROUP_LINK, '_blank');
    }
  } else {
    window.location.href = 'weixin://';
  }
}

// ===== 위챗 열기 =====
async function sendToWeChat() {
  const msg = buildOrderMsg();
  if (!msg) return;
  copyText(msg);
  showToast('복사 완료!\n위챗 단체방에 붙여넣기');
  setTimeout(() => { window.location.href = 'weixin://'; }, 400);
}

// 발주서 텍스트 생성 (공통)
function buildOrderMsg() {
  const clientIdx = document.getElementById('headerClientSelect').value;
  const clientObj = clientIdx !== '' ? CLIENTS[parseInt(clientIdx)] : null;
  const clientName = clientObj ? clientObj.name : '';
  const orders = {};

  document.querySelectorAll('.order-card').forEach(card => {
    const code = card.dataset.code;
    card.querySelectorAll('.qty-input').forEach(inp => {
      const qty = parseInt(inp.value) || 0;
      if (qty > 0) {
        const sz = inp.dataset.size || '';
        const color = inp.dataset.color || '기본';
        if (!orders[code]) orders[code] = {items:[]};
        orders[code].items.push({sz, color, qty});
      }
    });
  });

  if (!Object.keys(orders).length) { showToast('수량을 입력해주세요'); return null; }

  const today = new Date();
  const dateStr = `${today.getMonth()+1}월 ${today.getDate()}일`;
  let msg = clientName ? `${dateStr} ${clientName}\n` : `${dateStr}\n`;

  let grandQty = 0;
  for (const [code, data] of Object.entries(orders)) {
    msg += `${code}\n`;
    const parts = [];
    data.items.forEach(({sz, color, qty}) => {
      grandQty += qty;
      parts.push(color !== '기본' ? `${color} ${sz}-${qty}` : `${sz}-${qty}`);
    });
    msg += `  ${parts.join(' / ')}\n`;
  }
  msg += `총 ${grandQty}장`;
  return msg;
}

// ===== 발주 메시지 생성 =====
function generateOrder() {
  const msg = buildOrderMsg();
  if (!msg) return;
  copyText(msg);
  const grandQty = (msg.match(/총 (\d+)장/) || [])[1] || '';
  showToast(`발주 복사 완료!\n총 ${grandQty}장`);
}

// ===== 클립보드 =====
function copyText(text) {
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
}

// ===== Toast =====
function showToast(msg) {
  const t=document.getElementById('toast');t.innerHTML=msg.replace(/\n/g,'<br>');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}

// ===== 초기화 =====
initClientSelect();
fetchExchangeRate();
renderSample();
updateBadges();
</script>

var SAMPLE_DAYS=5;
function _dToTs(d){ if(!d) return 0; var m=String(d).match(/(\d{1,2})\/(\d{1,2})/); if(!m) return 0; var mo=+m[1], da=+m[2]; var now=new Date(); var y=now.getFullYear(); var dt=new Date(y,mo-1,da); if(dt.getTime()-now.getTime()>86400000*30) dt=new Date(y-1,mo-1,da); return dt.getTime(); }
function getSampleProducts(){ var base=_origGetSampleProducts(); var cutoff=Date.now()-SAMPLE_DAYS*86400000-86400000; return base.filter(function(p){ var t=_dToTs(p.d); return t===0 ? true : t>=cutoff; }); }
function _recoverG(t){t=t||'';var m=t.match(/(?:款号|货号|款號|貨號)\s*[:：]?\s*#?(\d{3,6})/);if(m)return m[1];m=t.match(/^#?(\d{4,6})(?![\d])/);if(m)return m[1];m=t.match(/#(\d{3,6})#/);if(m)return m[1];return '';}
function _grpKey(p){return (p.g&&String(p.g))||_recoverG(p.t)||p.code;}
function mergeDesigns(arr){var map={},order=[];arr.forEach(function(p){var k=_grpKey(p);if(!map[k]){map[k]={m:[]};order.push(k);}map[k].m.push(p);});return order.map(function(k){var ms=map[k].m;var best=ms.slice().sort(function(a,b){return (b.t||'').length-(a.t||'').length;})[0];var imgs=[],seen={};ms.forEach(function(p){(p.imgs&&p.imgs.length?p.imgs:[p.i]).forEach(function(u){if(u&&!seen[u]){seen[u]=1;imgs.push(u);}});});imgs=imgs.slice(0,12);var cols=[],cs={};ms.forEach(function(p){(p.colors||[]).forEach(function(c){if(!cs[c]){cs[c]=1;cols.push(c);}});});var d=ms.map(function(p){return p.d;}).filter(Boolean).sort(function(a,b){return _dToTs(b)-_dToTs(a);})[0]||best.d;var cat=best.cat;if(cat==='tee'){var nz=ms.map(function(p){return p.cat;}).filter(function(c){return c&&c!=='tee';});if(nz.length)cat=nz[0];}return {t:best.t,p:best.p,s:best.s||'',i:imgs[0]||best.i,d:d,code:k,cat:cat,g:k,colors:cols,imgs:imgs,_n:ms.length};});}
